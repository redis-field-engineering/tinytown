name = "tinytown-main"
default_cli = "auggie"
max_agents = 10
use_central_redis = true

[redis]
use_socket = false
socket_path = ".tt/redis.sock"
host = "127.0.0.1"
port = 16379
persist = false
aof_path = ".tt/redis.aof"
password = "tt_189af6ee81337510_9153"
tls_enabled = false
bind = "127.0.0.1"

[townhall]
bind = "127.0.0.1"
rest_port = 8080
request_timeout_ms = 30000

[townhall.auth]
mode = "none"
api_key_scopes = []
required_scopes = []
clock_skew_seconds = 60

[townhall.tls]
enabled = false

[townhall.mtls]
enabled = false
required = false

[agent_clis.aider]
name = "aider"
command = "aider --yes --no-auto-commits --message"

[agent_clis.aider.env]

[agent_clis.auggie]
name = "auggie"
command = "auggie --print"

[agent_clis.auggie.env]

[agent_clis.claude]
name = "claude"
command = "claude --print --dangerously-skip-permissions"

[agent_clis.claude.env]

[agent_clis.copilot]
name = "copilot"
command = "gh copilot"

[agent_clis.copilot.env]

[agent_clis.cursor]
name = "cursor"
command = "cursor"

[agent_clis.cursor.env]

[agent_clis.gemini]
name = "gemini"
command = "gemini"

[agent_clis.gemini.env]

[agent_clis.codex]
name = "codex"
command = "codex exec --dangerously-bypass-approvals-and-sandbox"

[agent_clis.codex.env]

[agent_clis.codex-mini]
name = "codex-mini"
command = "codex exec --dangerously-bypass-approvals-and-sandbox -m gpt-5.4-mini -c model_reasoning_effort=\"medium\""

[agent_clis.codex-mini.env]
